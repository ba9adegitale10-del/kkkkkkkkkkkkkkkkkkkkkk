<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"/></head>
<body>
<div th:fragment="layout(content, pageTitle, activePage)" class="app-shell">

  <aside class="sidebar">
    <a href="/dashboard" class="sidebar-brand" style="text-decoration:none;">
      <div class="brand-logo">
        <img th:src="@{/images/logo-crt.png}" alt="CRT"/>
      </div>
      <div>
        <div class="brand-name">Croissant-Rouge Tunisien</div>
        <div class="brand-sub">Delegation de Megrine</div>
      </div>
    </a>

    <nav class="sidebar-nav">
      <div class="nav-label">Principal</div>

      <a th:href="@{/dashboard}" th:class="${activePage=='dashboard'}?'nav-link active':'nav-link'">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
        </svg>
        Tableau de bord
      </a>

      <a th:href="@{/volunteers}" th:class="${activePage=='volunteers'}?'nav-link active':'nav-link'">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Benevoles
      </a>

      <a th:href="@{/donations}" th:class="${activePage=='donations'}?'nav-link active':'nav-link'">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        Dons et Aides
      </a>

      <a th:href="@{/stock}" th:class="${activePage=='stock'}?'nav-link active':'nav-link'">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
        Gestion de Stock
      </a>

      <div class="nav-label" sec:authorize="hasRole('ADMIN')" style="margin-top:6px;">Administration</div>

      <a th:href="@{/users}" th:class="${activePage=='users'}?'nav-link active':'nav-link'" sec:authorize="hasRole('ADMIN')">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
          <line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>
        </svg>
        Utilisateurs
      </a>

      <a th:href="@{/database}" th:class="${activePage=='database'}?'nav-link active':'nav-link'" sec:authorize="hasRole('ADMIN')">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <ellipse cx="12" cy="5" rx="9" ry="3"/>
          <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
          <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
        </svg>
        Base de donnees
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-pill">
        <div class="user-av"><span sec:authentication="name">A</span></div>
        <div>
          <div class="user-name" sec:authentication="name">Utilisateur</div>
          <div class="user-role" sec:authorize="hasRole('ADMIN')">Administrateur</div>
          <div class="user-role" sec:authorize="hasRole('USER')">Utilisateur</div>
        </div>
      </div>
      <form th:action="@{/logout}" method="post" style="margin:0;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn-logout">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Se deconnecter
        </button>
      </form>
    </div>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <h1 class="topbar-title" th:text="${pageTitle}">Page</h1>
      <div class="topbar-right">
        <div class="status-pill">
          <span class="status-dot"></span>
          Systeme actif
        </div>
      </div>
    </header>
    <main class="page-wrap" th:replace="${content}">Content</main>
  </div>

</div>
<script>
setTimeout(()=>{
  document.querySelectorAll('.flash').forEach(el=>{
    el.style.transition='opacity .5s';
    el.style.opacity='0';
    setTimeout(()=>el.remove(),500);
  });
},4000);
</script>
</body>
</html>
