<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section#pg},'Evenement','events')}">
<section id="pg">
  <div class="ph">
    <div>
      <h2 class="ph-title">
        <span th:if="${event.id!=null}">Modifier l'evenement</span>
        <span th:if="${event.id==null}">Nouvel evenement</span>
      </h2>
      <p class="ph-sub">Planifiez une activite humanitaire</p>
    </div>
    <a href="/events" class="btn btn-secondary">&#8592; Retour</a>
  </div>
  <div class="form-wrap" style="max-width:800px;">
    <form action="/events/save" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="hidden" name="id" th:value="${event.id}"/>
      <div class="form-grid">
        <div class="fgroup full">
          <label class="flabel">Titre de l'evenement *</label>
          <input type="text" name="title" th:value="${event.title}" class="finput" placeholder="Ex: Distribution Ramadan 2026" required/>
        </div>
        <div class="fgroup">
          <label class="flabel">Type *</label>
          <select name="type" class="finput">
            <option value="HUMANITARIAN"  th:selected="${event.type==null or event.type.name()=='HUMANITARIAN'}">Humanitaire</option>
            <option value="DISTRIBUTION"  th:selected="${event.type!=null and event.type.name()=='DISTRIBUTION'}">Distribution</option>
            <option value="BLOOD_DONATION" th:selected="${event.type!=null and event.type.name()=='BLOOD_DONATION'}">Don du sang</option>
            <option value="TRAINING"      th:selected="${event.type!=null and event.type.name()=='TRAINING'}">Formation</option>
            <option value="AWARENESS"     th:selected="${event.type!=null and event.type.name()=='AWARENESS'}">Sensibilisation</option>
            <option value="OTHER"         th:selected="${event.type!=null and event.type.name()=='OTHER'}">Autre</option>
          </select>
        </div>
        <div class="fgroup">
          <label class="flabel">Statut</label>
          <select name="status" class="finput">
            <option value="UPCOMING"  th:selected="${event.status==null or event.status.name()=='UPCOMING'}">A venir</option>
            <option value="ONGOING"   th:selected="${event.status!=null and event.status.name()=='ONGOING'}">En cours</option>
            <option value="COMPLETED" th:selected="${event.status!=null and event.status.name()=='COMPLETED'}">Termine</option>
            <option value="CANCELLED" th:selected="${event.status!=null and event.status.name()=='CANCELLED'}">Annule</option>
          </select>
        </div>
        <div class="fgroup">
          <label class="flabel">Date</label>
          <input type="date" name="eventDate" th:value="${event.eventDate}" class="finput"/>
        </div>
        <div class="fgroup">
          <label class="flabel">Lieu</label>
          <input type="text" name="location" th:value="${event.location}" class="finput" placeholder="Siege CRT Megrine"/>
        </div>
        <div class="fgroup">
          <label class="flabel">Nombre de participants</label>
          <input type="number" name="participantsCount" th:value="${event.participantsCount}" class="finput" placeholder="50"/>
        </div>

        <!-- Responsable -->
        <div class="fgroup full">
          <label class="flabel">Responsable de l'action *</label>
          <input type="text" name="responsibleName" th:value="${event.responsibleName}" class="finput" placeholder="Nom du responsable principal"/>
        </div>

        <!-- Benevoles -->
        <div class="fgroup full">
          <label class="flabel">Noms des benevoles participants</label>
          <input type="text" name="volunteerNames" th:value="${event.volunteerNames}" class="finput"
                 placeholder="Ahmed Ben Ali, Fatima Trabelsi, Mohamed Gharbi..."/>
          <span class="fhint">Separez les noms par des virgules</span>
        </div>

        <!-- Familles -->
        <div class="fgroup full">
          <label class="flabel">Familles beneficiaires</label>
          <input type="text" name="familyNames" th:value="${event.familyNames}" class="finput"
                 placeholder="Ben Salah Hedi, Trabelsi Fatma..."/>
          <span class="fhint">Separez les noms par des virgules</span>
        </div>

        <!-- Benevoles disponibles -->
        <div class="fgroup full" th:if="${volunteers!=null and !volunteers.empty}">
          <label class="flabel">Benevoles enregistres (cliquez pour ajouter)</label>
          <div style="display:flex;flex-wrap:wrap;gap:6px;padding:10px;background:var(--gray-1);border-radius:var(--r);border:1px solid var(--gray-2);">
            <span th:each="v : ${volunteers}"
                  onclick="addToField('volunteerNames', this.textContent)"
                  style="padding:4px 12px;background:var(--green-bg);color:var(--green);border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(22,163,74,0.2);"
                  th:text="${v.fullName}">Bénévole</span>
          </div>
        </div>

        <!-- Familles disponibles -->
        <div class="fgroup full" th:if="${families!=null and !families.empty}">
          <label class="flabel">Familles enregistrees (cliquez pour ajouter)</label>
          <div style="display:flex;flex-wrap:wrap;gap:6px;padding:10px;background:var(--gray-1);border-radius:var(--r);border:1px solid var(--gray-2);">
            <span th:each="f : ${families}"
                  onclick="addToField('familyNames', this.textContent)"
                  style="padding:4px 12px;background:var(--amber-bg);color:var(--amber);border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(180,83,9,0.2);"
                  th:text="${f.headName}">Famille</span>
          </div>
        </div>

        <div class="fgroup full">
          <label class="flabel">Description</label>
          <input type="text" name="description" th:value="${event.description}" class="finput" placeholder="Description de l'evenement..."/>
        </div>
        <div class="fgroup full">
          <label class="flabel">Notes</label>
          <input type="text" name="notes" th:value="${event.notes}" class="finput" placeholder="Notes supplementaires..."/>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">&#10003; Enregistrer</button>
        <a href="/events" class="btn btn-secondary">Annuler</a>
      </div>
    </form>
  </div>

  <script>
    function addToField(fieldName, value) {
      const input = document.querySelector('input[name="' + fieldName + '"]');
      const current = input.value.trim();
      if (current === '') {
        input.value = value;
      } else if (!current.includes(value)) {
        input.value = current + ', ' + value;
      }
    }
  </script>

</section>
</div>
</body>
</html>
