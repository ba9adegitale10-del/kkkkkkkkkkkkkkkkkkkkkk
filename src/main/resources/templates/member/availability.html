<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section#pg},'Mes Disponibilites','member')}">
<section id="pg">
  <div class="ph">
    <div><h2 class="ph-title">Mes Disponibilites</h2><p class="ph-sub">Indiquez vos creneaux libres pour les missions</p></div>
    <a href="/member" class="btn btn-secondary">&#8592; Retour</a>
  </div>
  <div class="form-wrap" style="max-width:600px;">
    <form action="/member/availability" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;">

        <div th:each="slot : ${ {'LUNDI_MATIN','LUNDI_SOIREE','MARDI_MATIN','MARDI_SOIREE','MERCREDI_MATIN','MERCREDI_SOIREE','JEUDI_MATIN','JEUDI_SOIREE','VENDREDI_MATIN','VENDREDI_SOIREE','SAMEDI','DIMANCHE'} }"
             style="display:flex;align-items:center;gap:10px;padding:14px 16px;border:1.5px solid var(--gray-2);border-radius:10px;cursor:pointer;">
          <input type="checkbox" name="slots" th:value="${slot}"
                 th:checked="${selectedSlots!=null and selectedSlots.contains(slot)}"
                 style="width:18px;height:18px;accent-color:var(--red);cursor:pointer;"/>
          <span style="font-size:14px;font-weight:500;" th:text="${slot.replace('_',' ')}">Slot</span>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">&#10003; Enregistrer mes disponibilites</button>
        <a href="/member" class="btn btn-secondary">Annuler</a>
      </div>
    </form>
  </div>
</section>
</div>
</body>
</html>
