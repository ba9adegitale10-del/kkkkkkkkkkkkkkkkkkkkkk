<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — CRT Megrine</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div class="login-wrap">
  <div class="login-art">
    <div class="login-art-circles"><span></span><span></span><span></span></div>
    <div style="position:relative;z-index:1;">
      <div class="login-logo-big">
        <img th:src="@{/images/logo-crt.png}" alt="CRT"/>
      </div>
      <div class="login-art-title">Croissant-Rouge<br/>Tunisien</div>
      <p class="login-art-sub">Plateforme de gestion de la délégation de Megrine — bénévoles, dons et stocks humanitaires.</p>
    </div>
  </div>
  <div class="login-panel">
    <div class="login-form-wrap">
      <h2 class="login-heading">Connexion</h2>
      <p class="login-sub">Entrez vos identifiants pour accéder au système.</p>
      <div th:if="${error}" class="flash flash-err" style="margin-bottom:20px;">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span th:text="${error}">Erreur</span>
      </div>
      <div th:if="${message}" class="flash flash-ok" style="margin-bottom:20px;">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        <span th:text="${message}">Message</span>
      </div>
      <form method="post" action="/login">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="login-fgroup">
          <label class="flabel">Nom d'utilisateur</label>
          <input type="text" name="username" class="finput" placeholder="admin" autocomplete="username" required/>
        </div>
        <div class="login-fgroup">
          <label class="flabel">Mot de passe</label>
          <input type="password" name="password" class="finput" placeholder="••••••••" autocomplete="current-password" required/>
        </div>
        <button type="submit" class="btn btn-primary login-btn">
          Se connecter
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </form>
      <div class="login-demo">
        <strong>admin</strong> / admin123 &nbsp;·&nbsp; <strong>user</strong> / user123
      </div>
    </div>
  </div>
</div>
</body>
</html>
