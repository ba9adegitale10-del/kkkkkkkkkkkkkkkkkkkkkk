<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section#pg},'Bénévoles','volunteers')}">
<section id="pg">
  <div th:if="${success}" class="flash flash-ok">✓ <span th:text="${success}"></span></div>
  <div class="ph">
    <div>
      <h2 class="ph-title">Gestion des bénévoles</h2>
      <p class="ph-sub">Membres actifs de la délégation de Megrine</p>
    </div>
    <div class="ph-actions">
      <form th:action="@{/volunteers}" method="get" class="search-box">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" name="search" th:value="${search}" class="search-inp" placeholder="Rechercher…"/>
      </form>
      <a href="/volunteers/new" class="btn btn-primary">+ Nouveau bénévole</a>
    </div>
  </div>
  <div class="card">
    <table class="tbl">
      <thead><tr><th>Bénévole</th><th>Contact</th><th>Groupe sanguin</th><th>Adhésion</th><th>Statut</th><th>Actions</th></tr></thead>
      <tbody>
        <tr th:if="${volunteers.empty}">
          <td colspan="6"><div class="empty"><div class="empty-ico">👥</div><div class="empty-title">Aucun bénévole trouvé</div></div></td>
        </tr>
        <tr th:each="v : ${volunteers}">
          <td>
            <div style="display:flex;align-items:center;gap:11px;">
              <div class="av" th:text="${#strings.substring(v.firstName,0,1)+#strings.substring(v.lastName,0,1)}">AB</div>
              <div>
                <div class="cell-name" th:text="${v.fullName}">Nom</div>
                <div class="cell-sub" th:text="${v.address?:'—'}">Adresse</div>
              </div>
            </div>
          </td>
          <td>
            <div class="cell-name" th:text="${v.phone?:'—'}">Tel</div>
            <div class="cell-sub" th:text="${v.email?:'—'}">Email</div>
          </td>
          <td><span class="blood" th:text="${v.bloodType?:'?'}">A+</span></td>
          <td style="color:var(--ink-50);font-size:13px;" th:text="${v.joinDate!=null?#temporals.format(v.joinDate,'dd/MM/yyyy'):'—'}">Date</td>
          <td>
            <span class="badge"
              th:classappend="${v.status.name()=='ACTIVE'}?'b-green':(${v.status.name()=='PENDING'}?'b-amber':'b-gray')"
              th:text="${v.status.name()=='ACTIVE'?'Actif':v.status.name()=='INACTIVE'?'Inactif':'En attente'}">S</span>
          </td>
          <td>
            <div class="actions">
              <a th:href="@{/volunteers/edit/{id}(id=${v.id})}" class="btn btn-secondary btn-sm btn-icon">✏️</a>
              <a th:href="@{/volunteers/delete/{id}(id=${v.id})}" class="btn btn-danger btn-sm btn-icon" onclick="return confirm('Supprimer ?')">🗑️</a>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
</div>
</body>
</html>
