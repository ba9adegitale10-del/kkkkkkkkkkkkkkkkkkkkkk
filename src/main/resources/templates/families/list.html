<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#CC1A1A"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="CRT Megrine"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icons/icon-apple.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section#pg},'Familles Beneficiaires','families')}">
<section id="pg">

  <div th:if="${success}" class="flash flash-ok">&#10003; <span th:text="${success}"></span></div>
  <div th:if="${error}" class="flash flash-err">&#10007; <span th:text="${error}"></span></div>

  <div class="ph">
    <div>
      <h2 class="ph-title">Familles Beneficiaires</h2>
      <p class="ph-sub">
        <span th:text="${totalFamilies}">0</span> familles enregistrees —
        <span th:text="${activeFamilies}">0</span> actives
      </p>
    </div>
    <div class="ph-actions">
      <form th:action="@{/families}" method="get" class="search-box">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" name="search" th:value="${search}" class="search-inp" placeholder="Rechercher une famille…"/>
      </form>
      <a href="/families/new" class="btn btn-primary">+ Nouvelle famille</a>
    </div>
  </div>

  <!-- Filtres categories -->
  <div class="cat-pills">
    <a href="/families" class="cat-pill" th:classappend="${selectedCategory==null}?' active':''">Toutes</a>
    <a th:href="@{/families(category='NEEDY')}"    class="cat-pill" th:classappend="${selectedCategory=='NEEDY'}?' active':''">Necessiteuses</a>
    <a th:href="@{/families(category='ORPHAN')}"   class="cat-pill" th:classappend="${selectedCategory=='ORPHAN'}?' active':''">Orphelins</a>
    <a th:href="@{/families(category='DISABLED')}" class="cat-pill" th:classappend="${selectedCategory=='DISABLED'}?' active':''">Handicapes</a>
    <a th:href="@{/families(category='ELDERLY')}"  class="cat-pill" th:classappend="${selectedCategory=='ELDERLY'}?' active':''">Ages</a>
    <a th:href="@{/families(category='REFUGEE')}"  class="cat-pill" th:classappend="${selectedCategory=='REFUGEE'}?' active':''">Refugies</a>
    <a th:href="@{/families(category='OTHER')}"    class="cat-pill" th:classappend="${selectedCategory=='OTHER'}?' active':''">Autres</a>
  </div>

  <div class="card">
    <table class="tbl">
      <thead>
        <tr><th>Chef de famille</th><th>Categorie</th><th>Membres</th><th>Contact</th><th>Situation</th><th>Statut</th><th>Actions</th></tr>
      </thead>
      <tbody>
        <tr th:if="${families.empty}">
          <td colspan="7"><div class="empty"><div class="empty-ico">&#127968;</div><div class="empty-title">Aucune famille enregistree</div></div></td>
        </tr>
        <tr th:each="f : ${families}">
          <td>
            <div style="display:flex;align-items:center;gap:10px;">
              <div class="av" style="background:var(--amber);" th:text="${#strings.substring(f.headName,0,1).toUpperCase()}">F</div>
              <div>
                <div class="cell-name" th:text="${f.headName}">Nom</div>
                <div class="cell-sub" th:text="${f.address?:'—'}">Adresse</div>
              </div>
            </div>
          </td>
          <td>
            <span class="badge"
              th:classappend="${f.category.name()=='NEEDY'}?'b-red':(${f.category.name()=='ORPHAN'}?'b-blue':(${f.category.name()=='DISABLED'}?'b-amber':'b-green'))"
              th:text="${f.category.name()=='NEEDY'?'Necessiteuse':f.category.name()=='ORPHAN'?'Orphelins':f.category.name()=='DISABLED'?'Handicape':f.category.name()=='ELDERLY'?'Age':f.category.name()=='REFUGEE'?'Refugie':'Autre'}">CAT</span>
          </td>
          <td style="text-align:center;">
            <span style="font-family:'Playfair Display',serif;font-size:18px;color:var(--dark);" th:text="${f.membersCount?:0}">0</span>
            <div style="font-size:10px;color:var(--gray-4);">membres</div>
          </td>
          <td>
            <div class="cell-name" th:text="${f.phone?:'—'}">Tel</div>
            <div class="cell-sub" th:text="${f.cin?:'—'}">CIN</div>
          </td>
          <td style="font-size:13px;color:var(--gray-4);" th:text="${f.situation?:'—'}">Situation</td>
          <td>
            <span class="badge" th:classappend="${f.status.name()=='ACTIVE'}?'b-green':'b-gray'"
                  th:text="${f.status.name()=='ACTIVE'?'Active':'Inactive'}">S</span>
          </td>
          <td>
            <div class="actions">
              <a th:href="@{/families/view/{id}(id=${f.id})}" class="btn btn-primary btn-sm">Voir</a>
              <a th:href="@{/families/edit/{id}(id=${f.id})}" class="btn btn-secondary btn-sm btn-icon">&#9998;</a>
              <a th:href="@{/families/delete/{id}(id=${f.id})}" class="btn btn-danger btn-sm btn-icon" onclick="return confirm('Supprimer ?')">&#128465;</a>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</section>
</div>
</body>
</html>
