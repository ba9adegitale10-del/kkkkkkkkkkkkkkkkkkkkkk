<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div th:replace="~{fragments/layout :: layout(~{::section#pg},'Enregistrer un don','donations')}">
<section id="pg">
  <div class="ph">
    <div>
      <h2 class="ph-title">
        <span th:if="${donation.id != null}">Modifier le don</span>
        <span th:if="${donation.id == null}">Enregistrer un don</span>
      </h2>
      <p class="ph-sub">Saisissez les informations du donateur</p>
    </div>
    <a href="/donations" class="btn btn-secondary">← Retour</a>
  </div>
  <div class="form-wrap">
    <form action="/donations/save" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="hidden" name="id" th:value="${donation.id}"/>
      <div class="form-grid">
        <div class="fgroup"><label class="flabel">Nom du donateur</label><input type="text" name="donorName" th:value="${donation.donorName}" class="finput" placeholder="Famille Ben Salah"/></div>
        <div class="fgroup"><label class="flabel">Email</label><input type="email" name="donorEmail" th:value="${donation.donorEmail}" class="finput" placeholder="email@exemple.com"/></div>
        <div class="fgroup"><label class="flabel">Téléphone</label><input type="text" name="donorPhone" th:value="${donation.donorPhone}" class="finput" placeholder="+216 20 000 000"/></div>
        <div class="fgroup"><label class="flabel">Montant (TND) *</label><input type="number" step="0.01" name="amount" th:value="${donation.amount}" class="finput" placeholder="500.00" required/></div>
        <div class="fgroup">
          <label class="flabel">Type de don *</label>
          <select name="type" class="finput">
            <option value="MONETARY"  th:selected="${donation.type==null or donation.type.name()=='MONETARY'}">💰 Monétaire</option>
            <option value="FOOD"      th:selected="${donation.type!=null and donation.type.name()=='FOOD'}">🥫 Alimentaire</option>
            <option value="CLOTHES"   th:selected="${donation.type!=null and donation.type.name()=='CLOTHES'}">👕 Vêtements</option>
            <option value="MEDICAL"   th:selected="${donation.type!=null and donation.type.name()=='MEDICAL'}">💊 Médical</option>
            <option value="OTHER"     th:selected="${donation.type!=null and donation.type.name()=='OTHER'}">📦 Autre</option>
          </select>
        </div>
        <div class="fgroup">
          <label class="flabel">Statut</label>
          <select name="status" class="finput">
            <option value="RECEIVED"    th:selected="${donation.status==null or donation.status.name()=='RECEIVED'}">✅ Reçu</option>
            <option value="PENDING"     th:selected="${donation.status!=null and donation.status.name()=='PENDING'}">⏳ En attente</option>
            <option value="DISTRIBUTED" th:selected="${donation.status!=null and donation.status.name()=='DISTRIBUTED'}">📤 Distribué</option>
          </select>
        </div>
        <div class="fgroup"><label class="flabel">Date du don</label><input type="date" name="donationDate" th:value="${donation.donationDate}" class="finput"/></div>
        <div class="fgroup full"><label class="flabel">Description</label><input type="text" name="description" th:value="${donation.description}" class="finput" placeholder="Description du don…"/></div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">✓ Enregistrer</button>
        <a href="/donations" class="btn btn-secondary">Annuler</a>
      </div>
    </form>
  </div>
</section>
</div>
</body>
</html>
